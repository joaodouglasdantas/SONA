pt-BR:
  hello: "Ola mundo"
  activerecord:
    errors:
      messages:
        record_invalid: "A validacao falhou: %{errors}"
        restrict_dependent_destroy:
          has_one: "Nao e possivel excluir o registro pois existe um %{record} dependente"
          has_many: "Nao e possivel excluir o registro pois existem %{record} dependentes"
  errors:
    format: "%{attribute} %{message}"
    messages:
      accepted: "deve ser aceito"
      blank: "nao pode ficar em branco"
      confirmation: "nao esta de acordo com a confirmacao"
      empty: "nao pode ficar vazio"
      equal_to: "deve ser igual a %{count}"
      even: "deve ser par"
      exclusion: "nao esta disponivel"
      greater_than: "deve ser maior que %{count}"
      greater_than_or_equal_to: "deve ser maior ou igual a %{count}"
      inclusion: "nao esta incluido na lista"
      invalid: "nao e valido"
      less_than: "deve ser menor que %{count}"
      less_than_or_equal_to: "deve ser menor ou igual a %{count}"
      model_invalid: "A validacao falhou: %{errors}"
      not_a_number: "nao e um numero"
      not_an_integer: "deve ser um inteiro"
      odd: "deve ser impar"
      other_than: "deve ser diferente de %{count}"
      present: "deve ficar em branco"
      required: "e obrigatorio(a)"
      taken: "ja esta em uso"
      too_long:
        one: "e muito longo (maximo: 1 caractere)"
        other: "e muito longo (maximo: %{count} caracteres)"
      too_short:
        one: "e muito curto (minimo: 1 caractere)"
        other: "e muito curto (minimo: %{count} caracteres)"
      wrong_length:
        one: "nao tem o tamanho correto (deve ter 1 caractere)"
        other: "nao tem o tamanho correto (deve ter %{count} caracteres)"
    template:
      body: "Por favor, verifique os seguintes campos:"
      header:
        one: "Nao foi possivel salvar este(a) %{model}: 1 erro."
        other: "Nao foi possivel salvar este(a) %{model}: %{count} erros."
  date:
    abbr_day_names:
      - Dom
      - Seg
      - Ter
      - Qua
      - Qui
      - Sex
      - Sab
    abbr_month_names:
      -
      - Jan
      - Fev
      - Mar
      - Abr
      - Mai
      - Jun
      - Jul
      - Ago
      - Set
      - Out
      - Nov
      - Dez
    day_names:
      - Domingo
      - Segunda-feira
      - Terca-feira
      - Quarta-feira
      - Quinta-feira
      - Sexta-feira
      - Sabado
    formats:
      default: "%d/%m/%Y"
      long: "%d de %B de %Y"
      short: "%d de %B"
    month_names:
      -
      - Janeiro
      - Fevereiro
      - Marco
      - Abril
      - Maio
      - Junho
      - Julho
      - Agosto
      - Setembro
      - Outubro
      - Novembro
      - Dezembro
    order:
      - :day
      - :month
      - :year
  time:
    formats:
      default: "%A, %d de %B de %Y, %H:%M h"
      long: "%d de %B de %Y, %H:%M h"
      short: "%d de %B, %H:%M h"
