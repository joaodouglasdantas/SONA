default: &default
  adapter: postgresql
  encoding: unicode
  username: <%= ENV.fetch("POSTGRES_USER", "postgres") %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", "postgres") %>
  host: <%= ENV.fetch("POSTGRES_HOST", "db") %>
  pool: 5 #? Número máximo de conexões simultâneas que o Rails pode abrir com o banco

#development:
# <<: *default
#  database: storage/development.sqlite3

development: #? Banco usado quando eu rodo o servidor local (rails server)
  <<: *default
  database: sona_development

#test:
#  <<: *default
#  database: storage/test.sqlite3

test:
  <<: *default
  database: sona_test

